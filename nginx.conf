# TLS certs: mount real certs at /etc/nginx/ssl/{fullchain.pem,privkey.pem}, or the
# entrypoint generates a dev self-signed certificate if those files are missing.
#
# Behind Azure App Service (TLS at edge), requests arrive on :80 with
# X-Forwarded-Proto: https — the map avoids redirect loops to https://.

map $http_x_forwarded_proto $redirect_http_to_https {
    https   0;
    default 1;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cafethecore.live www.cafethecore.live;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name cafethecore.live www.cafethecore.live;

    if ($redirect_http_to_https = 1) {
        return 301 https://$host$request_uri;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Default: local / health / Azure probe without production Host — no TLS redirect.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
