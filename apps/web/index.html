<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = "clinixai-theme";
          var s = localStorage.getItem(k);
          var dark =
            s === "dark" ||
            (s !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (s === "light") dark = false;
          if (s === "dark") dark = true;
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/icon-pwa.svg" type="image/svg+xml" sizes="512x512" />
    <link rel="apple-touch-icon" href="/icon-pwa.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" id="meta-theme-color" content="#2563EB" />
    <meta name="color-scheme" id="meta-color-scheme" content="light dark" />
    <meta
      name="description"
      content="ClinixAi – AI-powered healthcare facility intelligence, nearest hospitals, and clinical search."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ClinixAi" />
    <meta name="application-name" content="ClinixAi" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>ClinixAi – Healthcare Intelligence</title>
  </head>
  <body class="antialiased touch-manipulation">
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
